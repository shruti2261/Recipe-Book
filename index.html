<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" integrity="sha512-+4zCK9k+qNFUR5X+cKL9EIR+ZOhtIloNl9GIKS57V1MyNsYpYcUrUeQc9vNfzsWfV28IaLL3i96P9sdNyeRssA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Receipe App</title>
</head>
<body>
    <header>
        <nav>
            <h1 class="title">Delicious</h1>
            <form>
                <input type="text" placeholder="Search for Recipe" class="SearchBox">
                <button type="button" class="but">Search</button>
            </form>
        </nav>
    </header>
    <main>
        <section>
            <div class="featured-section" id="featuredSection">
                <h2 class="featured-title">Popular Categories</h2>
                <div class="posters-container">
                    <div class="poster-card" data-search="Burger">
                        <div class="image-wrapper">
                            <img src="images/burger.png" alt="Burgers">
                        </div>
                        <div class="poster-info">
                            <h3>Burgers</h3>
                            <p>Juicy & Gourmet</p>
                        </div>
                    </div>
                    <div class="poster-card" data-search="Pasta">
                        <div class="image-wrapper">
                            <img src="images/pasta.png" alt="Pasta">
                        </div>
                        <div class="poster-info">
                            <h3>Pasta</h3>
                            <p>Italian Classics</p>
                        </div>
                    </div>
                    <div class="poster-card" data-search="Sushi">
                        <div class="image-wrapper">
                            <img src="images/sushi.png" alt="Sushi">
                        </div>
                        <div class="poster-info">
                            <h3>Sushi</h3>
                            <p>Fresh & Premium</p>
                        </div>
                    </div>
                </div>
            </div>

            <button type="button" class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Back to Categories</button>

            <div class="receipe-cont">
                <h2>
                    Search your favourite recipes.....
                </h2>
            </div>
            <div class="recipe-details">
                <button type="button" class="recipe-close">
                    <i class="fas fa-times"></i>
                </button>
                <div class="recipe-details-content"></div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
